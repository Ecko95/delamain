<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sketch 002 — Signal Rack, Terminal-First</title>
<style>
	:root {
		--color-bg: #100a04; --color-surface: #1a1006; --color-surface-2: #2a1808;
		--color-border: #3a2410; --color-border-focus: #35e0d8;
		--color-text: #ffb066; --color-text-muted: #8a5a2e;
		--color-primary: #ff7a1a; --color-accent: #35e0d8; --color-danger: #ff4433;
		--color-sel-bg: #7a3d0d; --color-cyan-band: #0e2624;
		--status-starting: #35e0d8; --status-working: #ff7a1a; --status-waiting: #35e0d8;
		--status-idle: #8a5a2e; --status-done: #8a5a2e; --status-failed: #ff4433;
		--ctx-green: #35e0d8; --ctx-yellow: #ffb066; --ctx-red: #ff7a1a; --ctx-skull: #ff4433;
		--font-mono: "JetBrainsMono Nerd Font", "JetBrains Mono", "Cascadia Code", ui-monospace, monospace;
		--glow-orange: 0 0 8px rgba(255,122,26,.35); --glow-cyan: 0 0 8px rgba(53,224,216,.35); --glow-red: 0 0 10px rgba(255,68,51,.45);
	}
</style>
<link rel="stylesheet" href="../themes/default.css">
<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	body {
		background: var(--color-bg); color: var(--color-text);
		font-family: var(--font-mono); font-size: 14px; line-height: 1.45;
		padding-top: 46px; height: 100vh; overflow: hidden;
	}
	body::after {
		content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9000;
		background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
	}
	button { font-family: inherit; cursor: pointer; transition: all .15s ease; }

	#variant-nav {
		position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
		background: var(--color-surface); border-bottom: 1px solid var(--color-border);
		padding: 8px 16px; display: flex; gap: 8px; align-items: center;
	}
	#variant-nav .title { color: var(--color-text-muted); font-size: 11px; margin-right: 12px; letter-spacing: 1px; }
	.variant-tab {
		background: transparent; color: var(--color-text-muted);
		border: 1px solid var(--color-border); border-radius: 2px; padding: 4px 12px; font-size: 12px;
	}
	.variant-tab:hover { color: var(--color-text); border-color: var(--color-primary); }
	.variant-tab.active { color: var(--color-primary); border-color: var(--color-primary); box-shadow: var(--glow-orange); }
	.hint { margin-left: auto; color: var(--color-text-muted); font-size: 11px; }

	/* terminal frame: everything lives in one column of monospace rows */
	.term { height: calc(100vh - 46px); display: flex; flex-direction: column; white-space: pre; overflow: hidden; }
	.hdr, .keybar, .statusline { flex: none; padding: 2px 8px; }
	.hdr { color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); }
	.hdr b { color: var(--color-primary); font-weight: bold; text-shadow: var(--glow-orange); }
	.hdr .u { color: var(--color-accent); }
	.rows { flex: 1; overflow-y: auto; padding: 2px 0; }
	.row, .grp, .det { padding: 0 8px; }
	.grp { color: var(--color-text-muted); }
	.grp .cnt { color: var(--color-text); }
	.row { cursor: pointer; }
	.row:hover { background: var(--color-surface); }
	.row.sel { background: var(--color-sel-bg); color: #fff; }
	.row.sel .dim { color: #d8b28a; }
	.id { color: var(--color-accent); }
	.dim { color: var(--color-text-muted); }
	.eng-codex { color: var(--color-accent); } .eng-cursor { color: #c084fc; }
	.st-working { color: var(--status-working); } .st-starting { color: var(--status-starting); }
	.st-waiting { color: var(--status-waiting); animation: blink 1.2s step-end infinite; }
	.st-done, .st-idle { color: var(--status-idle); } .st-failed { color: var(--status-failed); }
	@keyframes blink { 50% { opacity: .35; } }
	.lv-green { color: var(--ctx-green); } .lv-yellow { color: var(--ctx-yellow); }
	.lv-red { color: var(--ctx-red); } .lv-skull { color: var(--ctx-skull); text-shadow: var(--glow-red); animation: blink 1s step-end infinite; }
	.flag { color: var(--color-danger); }

	.det { color: var(--color-text-muted); }
	.det .k { color: var(--color-text); }
	.det .tool { color: var(--color-accent); }
	.det .err { color: var(--color-danger); }
	.det-frame { border-left: 1px solid var(--color-primary); margin-left: 12px; }

	/* B: bottom dock */
	.dock {
		flex: none; height: 16em; border-top: 1px solid var(--color-border);
		background: var(--color-surface); display: flex; flex-direction: column;
		box-shadow: 0 -4px 12px rgba(53,224,216,.08);
	}
	.dock.focused { border-top: 1px solid var(--color-border-focus); box-shadow: 0 -4px 16px rgba(53,224,216,.22); }
	.dock .dock-title { flex: none; color: var(--color-accent); padding: 2px 8px; display: flex; }
	.dock .dock-pos { margin-left: auto; color: var(--color-text-muted); font-size: 12px; }
	.dock.focused .dock-pos { color: var(--color-accent); }
	.dock-body { flex: 1; overflow-y: auto; padding: 0 8px 2px; scrollbar-gutter: stable; }
	.dock-body::-webkit-scrollbar { width: 10px; }
	.dock-body::-webkit-scrollbar-track { background: var(--color-surface-2); border-left: 1px solid var(--color-border); }
	.dock-body::-webkit-scrollbar-thumb { background: var(--color-border); border: 2px solid var(--color-surface-2); }
	.dock-body:hover::-webkit-scrollbar-thumb, .dock.focused .dock-body::-webkit-scrollbar-thumb { background: var(--color-accent); box-shadow: var(--glow-cyan); }
	.dock-body { scrollbar-width: thin; scrollbar-color: var(--color-border) var(--color-surface-2); }
	.dock.focused .dock-body { scrollbar-color: var(--color-accent) var(--color-surface-2); }

	/* C: modal overlay */
	.modal-scrim { position: fixed; inset: 46px 0 0 0; background: rgba(6,3,1,.72); z-index: 8000; display: none; }
	.modal-scrim.open { display: block; }
	.modal {
		position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
		width: min(760px, 92%); max-height: 80%; overflow-y: auto;
		background: var(--color-surface); border: 1px solid var(--color-primary);
		box-shadow: var(--glow-orange), 0 20px 60px rgba(0,0,0,.6);
		padding: 8px 12px; white-space: pre;
	}
	.modal .bar { color: var(--color-primary); }

	.keybar {
		border-top: 1px solid var(--color-border); color: var(--color-text-muted); font-size: 12px;
		background: var(--color-surface);
	}
	.keybar b { color: var(--color-accent); font-weight: normal; }
	.statusline { color: var(--color-text-muted); font-size: 12px; min-height: 1.6em; }
	.statusline.warn { color: var(--color-danger); text-shadow: var(--glow-red); }
	.statusline.ask { color: var(--color-accent); }
	.statusline input {
		background: var(--color-bg); border: 1px solid var(--color-border-focus); color: var(--color-text);
		font-family: inherit; font-size: inherit; width: 60%; padding: 1px 6px; outline: none;
	}

	/* help overlay */
	#help {
		position: fixed; inset: 46px 0 0 0; background: rgba(6,3,1,.8); z-index: 8500; display: none;
		align-items: flex-start; justify-content: center; padding-top: 6%;
	}
	#help.open { display: flex; }
	#help .panel {
		background: var(--color-surface); border: 1px solid var(--color-border-focus);
		box-shadow: var(--glow-cyan); padding: 12px 20px; white-space: pre; font-size: 13px;
	}
	#help .panel b { color: var(--color-accent); font-weight: normal; }
	#help .panel .h { color: var(--color-primary); }
</style>
</head>
<body>

<div id="variant-nav">
	<span class="title">SKETCH 002 · SIGNAL RACK — TERMINAL-FIRST</span>
	<button class="variant-tab" onclick="setVariant('inline', this)">A: Inline Expand</button>
	<button class="variant-tab active" onclick="setVariant('dock', this)">B: Bottom Dock ★</button>
	<button class="variant-tab" onclick="setVariant('modal', this)">C: Peer Modal</button>
	<span class="hint">click the page once, then drive with the keyboard — ? for help</span>
</div>

<div class="term" id="term"></div>
<div class="modal-scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div id="help"><div class="panel" id="helppanel"></div></div>

<script>
// ── data: real PeerRecord shape ──
const PEERS = [
	{ id: "e86e7ad2", status: "working", activity: "EDIT opentuiV3.ts", project: "delamain", branch: "peer/e86e7ad2-dash-v3", engine: "codex", model: "gpt-5.5-codex", pid: 41233, elapsed: "12m04s", ctx: 42, level: "green", compacted: false,
		log: [["exec", "rtk cargo test — 0 failed"], ["edit", "src/dashboard/opentuiV3.ts +48 -12"], ["think", "wire peer modal to roster state"]] },
	{ id: "b3f19c04", status: "working", activity: "EXEC vitest run", project: "delamain", branch: "peer/b3f19c04-sizing-t1", engine: "cursor", model: "composer-2.5", pid: 41871, elapsed: "34m17s", ctx: 71, level: "yellow", compacted: true,
		log: [["exec", "npx vitest run — 2 suites"], ["warn", "auto-compacted (lossy)"], ["edit", "src/frozen-gate/extractors/tsx.ts"]] },
	{ id: "a7d2210e", status: "waiting", activity: "NEEDS REPLY", project: "delamain", branch: "peer/a7d2210e-mcp-guard", engine: "codex", model: "gpt-5.5-codex", pid: 40966, elapsed: "48m52s", ctx: 88, level: "red", compacted: false,
		log: [["ask", "merge strategy for conflicting migration?"], ["wait", "needs operator reply"], ["idle", "6m since last event"]] },
	{ id: "4c9e77aa", status: "failed", activity: "EXIT 1 conflict", project: "delamain", branch: "peer/4c9e77aa-theme-swap", engine: "codex", model: "gpt-5.5-codex", pid: 39102, elapsed: "1h02m", ctx: 96, level: "skull", compacted: true,
		log: [["error", "CONFLICT src/dashboard/theme.ts"], ["warn", "auto-compacted twice"], ["exit", "engine terminated (1)"]] },
	{ id: "d15b3fe0", status: "done", activity: "MERGED → main", project: "delamain", branch: "peer/d15b3fe0-log-dedup", engine: "codex", model: "gpt-5.5-codex", pid: 38240, elapsed: "22m40s", ctx: 55, level: "green", compacted: false,
		log: [["merge", "fast-forward to main"], ["verify", "214 tests passed"], ["clean", "worktree removed"]] },
	{ id: "f0a4c9d1", status: "starting", activity: "SPAWN checkout", project: "delamain", branch: "peer/f0a4c9d1-peer-search", engine: "cursor", model: "composer-2.5", pid: 42210, elapsed: "0m41s", ctx: 3, level: "green", compacted: false,
		log: [["spawn", "linked worktree created"], ["checkout", "origin/main @ dd6a9c0"], ["boot", "engine handshake ok"]] },
];
// pad each peer's log out to a realistic scrollable history (~40 events)
const FILLER = [["exec", "rtk git status — clean"], ["edit", "src/dashboard/model.ts +6 -2"], ["think", "reconcile roster offsets"], ["exec", "npx vitest run — 214 passed"], ["read", "src/dashboard/v3Input.ts"], ["exec", "rtk tsc — 0 errors"], ["edit", "tests/dashboard.test.ts +22 -4"], ["plan", "next: wire dock scroll state"]];
for (const p of PEERS) {
	const hist = Array.from({ length: 36 }, (_, i) => FILLER[(i * 3 + p.pid) % FILLER.length]);
	p.log = [...hist, ...p.log];
}
const ORDER = ["working", "waiting", "starting", "failed", "done"];
const GLYPH = { working: "◉", waiting: "◍", starting: "◌", done: "●", failed: "✖" };

// ── state (mirrors DashboardState in model.ts) ──
let variant = "dock";             // which sketch variant (B won)
let sel = 0;                      // selectedIndex into flat visible list
let expandedId = null;            // toggle-details target
let collapsed = {};               // collapsed status groups
let mode = "normal";              // normal | kill-confirm | answer | help
let message = "";
let focusPane = "peers";          // peers | logs (tab cycles, per keybindings.ts)
let dockScroll = null;            // null = follow tail (stick to bottom)

function focusDock() { focusPane = "logs"; render(); }
function updateDockPos() {
	const db = document.getElementById("dock-body"), pos = document.getElementById("dock-pos");
	if (!db || !pos) return;
	const atBottom = db.scrollTop + db.clientHeight >= db.scrollHeight - 4;
	dockScroll = atBottom ? null : db.scrollTop;
	const total = selPeer()?.log.length ?? 0;
	const frac = db.scrollHeight <= db.clientHeight ? 1 : (db.scrollTop + db.clientHeight) / db.scrollHeight;
	pos.textContent = `log ${Math.max(1, Math.round(frac * total))}/${total} ${atBottom ? "▼ tail" : "▲ scrolled"}`;
}

const pad = (s, n) => (s.length > n ? s.slice(0, n - 1) + "…" : s.padEnd(n));
const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
const meter = p => {
	const filled = Math.round(p.ctx / 10);
	return `<span class="lv-${p.level}">${"█".repeat(filled)}${"░".repeat(10 - filled)} ${String(p.ctx).padStart(2)}%</span>`;
};

function visiblePeers() {
	const out = [];
	for (const st of ORDER) for (const p of PEERS) if (p.status === st && !collapsed[st]) out.push(p);
	return out;
}
function selPeer() { return visiblePeers()[sel]; }

function peerLine(p, isSel) {
	const eng = `<span class="eng-${p.engine}">${pad(p.engine, 6)}</span>`;
	const flag = p.compacted ? '<span class="flag">⛁</span>' : " ";
	return `<div class="row ${isSel ? "sel" : ""}" onclick="clickRow('${p.id}')">` +
		`<span class="st-${p.status}">${isSel ? "▶" : " "} ${GLYPH[p.status]}</span> ` +
		`<span class="id">${p.id}</span> ${eng} ` +
		`<span class="dim">${pad(p.branch, 30)}</span> ` +
		`${pad(p.activity, 20)} ${meter(p)} ${flag} ` +
		`<span class="dim">${p.elapsed.padStart(7)}</span></div>`;
}

function detailBlock(p, framed) {
	const logs = p.log.map(([k, v]) =>
		`<div class="det ${framed ? "det-frame" : ""}">  ├ <span class="${k === "error" ? "err" : "tool"}">${k.padEnd(8)}</span> ${esc(v)}</div>`).join("");
	return `<div class="det ${framed ? "det-frame" : ""}">  <span class="k">model</span> ${p.model}   <span class="k">pid</span> ${p.pid}   <span class="k">worktree</span> .delamain/worktrees/${p.id}   <span class="k">ctx</span> ${meter(p)}</div>${logs}`;
}

function render() {
	const vis = visiblePeers();
	if (sel >= vis.length) sel = Math.max(0, vis.length - 1);
	const cur = vis[sel];
	const counts = {};
	for (const p of PEERS) counts[p.status] = (counts[p.status] || 0) + 1;
	const chips = ORDER.filter(s => counts[s]).map(s => `<span class="st-${s}">${GLYPH[s]}${counts[s]}</span> <span class="dim">${s}</span>`).join("  ");

	let body = "";
	for (const st of ORDER) {
		const group = PEERS.filter(p => p.status === st);
		if (!group.length) continue;
		body += `<div class="grp">${collapsed[st] ? "▸" : "▾"} ${st.toUpperCase()} <span class="cnt">${group.length}</span> ${"─".repeat(Math.max(4, 96 - st.length))}</div>`;
		if (collapsed[st]) continue;
		for (const p of group) {
			const isSel = cur && p.id === cur.id;
			body += peerLine(p, isSel);
			if (variant === "inline" && expandedId === p.id) body += detailBlock(p, true);
		}
	}

	let dock = "";
	if (variant === "dock" && cur) {
		dock = `<div class="dock ${focusPane === "logs" ? "focused" : ""}" onclick="focusDock()">` +
			`<div class="dock-title">┌─ ${cur.id} · ${cur.branch} ${"─".repeat(20)}<span class="dock-pos" id="dock-pos">log —/${cur.log.length}</span></div>` +
			`<div class="dock-body" id="dock-body" onscroll="updateDockPos()">${detailBlock(cur, false)}</div></div>`;
	}

	let status = `<div class="statusline">${esc(message)}</div>`;
	if (mode === "kill-confirm" && cur) {
		status = `<div class="statusline warn">kill ${cur.id}? <b>↵</b> confirm · <b>esc</b> cancel</div>`;
	} else if (mode === "answer" && cur) {
		status = `<div class="statusline ask">reply → ${cur.id}: <input id="answer-input" placeholder="type answer, ↵ send, esc cancel"></div>`;
	}

	document.getElementById("term").innerHTML =
		`<div class="hdr"><b>DELAMAIN ▍FLEET</b>  ${chips}   <span class="dim">codex 5h</span> <span class="u">▓▓▓▓▓▓░░░░ 63%</span></div>` +
		`<div class="rows">${body}</div>` +
		dock + status +
		`<div class="keybar"> <b>↑↓/jk</b> ${focusPane === "logs" ? "scroll log" : "move"}  <b>tab</b> focus ${focusPane === "logs" ? "peers" : "logs"}  <b>↵/spc</b> details  <b>b</b> log bottom  <b>c</b> collapse  <b>a</b> answer  <b>x</b> kill  <b>e</b> error  <b>g/G</b> top/bot  <b>?</b> help  <b>q</b> quit</div>`;
	const db = document.getElementById("dock-body");
	if (db) { db.scrollTop = dockScroll === null ? db.scrollHeight : dockScroll; updateDockPos(); }

	// modal variant
	const scrim = document.getElementById("scrim");
	if (variant === "modal" && expandedId && cur) {
		const p = PEERS.find(x => x.id === expandedId) || cur;
		document.getElementById("modal").innerHTML =
			`<div class="bar">┌─ PEER ${p.id} ${"─".repeat(40)} esc ┐</div>` +
			`<div class="det">  <span class="k">status</span> <span class="st-${p.status}">${GLYPH[p.status]} ${p.status.toUpperCase()}</span>   <span class="k">engine</span> <span class="eng-${p.engine}">${p.engine}</span> ${p.model}   <span class="k">elapsed</span> ${p.elapsed}</div>` +
			detailBlock(p, false) +
			`<div class="det">  <span class="k">actions</span> <b class="tool">a</b> answer · <b class="tool">x</b> kill · <b class="tool">i</b> integrate</div>` +
			`<div class="bar">└${"─".repeat(58)}┘</div>`;
		scrim.classList.add("open");
	} else {
		scrim.classList.remove("open");
	}

	const inp = document.getElementById("answer-input");
	if (inp) inp.focus();

	document.getElementById("helppanel").innerHTML =
		`<div class="h">DELAMAIN — KEYBINDINGS (keybindings.ts)</div>\n` +
		`<b>↑/k ↓/j</b>   select prev / next peer\n<b>↵ / space</b> toggle details\n<b>tab</b>       cycle focus pane\n` +
		`<b>c</b>         collapse/expand status group\n<b>g / G</b>     jump top / bottom\n<b>e</b>         jump to first error\n` +
		`<b>a</b>         answer waiting peer\n<b>x</b>         kill (↵ confirm, esc cancel)\n<b>r</b>         refresh\n<b>t</b>         cycle theme\n<b>q</b>         quit\n\n<span class="h">esc / ? to close</span>`;
	document.getElementById("help").classList.toggle("open", mode === "help");
}

// ── keyboard: mirrors commandForKey() ──
document.addEventListener("keydown", e => {
	if (mode === "answer") {
		if (e.key === "Enter") { message = `▸ reply sent to ${selPeer().id}`; mode = "normal"; render(); }
		if (e.key === "Escape") { mode = "normal"; message = ""; render(); }
		return;
	}
	if (mode === "kill-confirm") {
		if (e.key === "Enter") {
			const p = selPeer(); p.status = "failed"; p.activity = "KILLED by operator";
			message = `▸ kill signal → ${p.id}`; mode = "normal"; render();
		}
		if (e.key === "Escape") { mode = "normal"; message = ""; render(); }
		e.preventDefault(); return;
	}
	if (mode === "help") {
		if (e.key === "Escape" || e.key === "?" || e.key === "q") { mode = "normal"; render(); }
		return;
	}
	const vis = visiblePeers();
	// logs pane focused (dock variant): jk/arrows scroll the log, per commandForKey()
	if (focusPane === "logs" && variant === "dock") {
		const db = document.getElementById("dock-body");
		const line = 20;
		switch (e.key) {
			case "ArrowDown": case "j": db.scrollBy(0, line); e.preventDefault(); return;
			case "ArrowUp": case "k": db.scrollBy(0, -line); e.preventDefault(); return;
			case "PageDown": db.scrollBy(0, db.clientHeight); e.preventDefault(); return;
			case "PageUp": db.scrollBy(0, -db.clientHeight); e.preventDefault(); return;
			case "b": dockScroll = null; render(); return;
			case "Tab": focusPane = "peers"; e.preventDefault(); render(); return;
			case "?": mode = "help"; render(); return;
		}
		return;
	}
	switch (e.key) {
		case "Tab": if (variant === "dock") { focusPane = "logs"; } e.preventDefault(); break;
		case "ArrowDown": case "j": sel = Math.min(vis.length - 1, sel + 1); dockScroll = null; if (variant !== "inline") expandedId = selPeer()?.id ?? null; break;
		case "ArrowUp": case "k": sel = Math.max(0, sel - 1); dockScroll = null; if (variant !== "inline") expandedId = selPeer()?.id ?? null; break;
		case "Enter": case " ": expandedId = expandedId === selPeer()?.id ? null : selPeer()?.id; e.preventDefault(); break;
		case "Escape": expandedId = null; message = ""; break;
		case "g": sel = 0; break;
		case "G": sel = vis.length - 1; break;
		case "c": { const st = selPeer()?.status; if (st) collapsed[st] = !collapsed[st]; break; }
		case "e": { const i = vis.findIndex(p => p.status === "failed"); if (i >= 0) { sel = i; message = "▸ jumped to first error"; } break; }
		case "a": mode = "answer"; break;
		case "x": mode = "kill-confirm"; break;
		case "r": message = "▸ refreshed"; break;
		case "t": message = "▸ theme cycle (default ⇄ cyberpunk) — sketch is cyberpunk-only"; break;
		case "?": mode = "help"; break;
		case "q": message = "▸ quit (mock)"; break;
		default: return;
	}
	render();
});

function clickRow(id) {
	const i = visiblePeers().findIndex(p => p.id === id);
	if (i >= 0) { sel = i; expandedId = expandedId === id && variant === "inline" ? null : id; }
	render();
}
function setVariant(v, btn) {
	variant = v;
	if (v !== "inline") expandedId = v === "dock" ? null : expandedId;
	document.querySelectorAll(".variant-tab").forEach(t => t.classList.remove("active"));
	btn.classList.add("active");
	render();
}
document.getElementById("scrim").addEventListener("click", e => { if (e.target.id === "scrim") { expandedId = null; render(); } });

render();
</script>
</body>
</html>
